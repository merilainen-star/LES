name: Publish Extensions (Edge + Firefox)

on:
  push:
    branches: [main]
    paths:
      - 'LekolarEnhancer/**'
      - 'LekolarEnhancer-Edge/**'

jobs:
  # ── 1. Bump versions and commit back ──────────────────────────────────────
  bump-versions:
    name: Bump manifest versions
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      firefox_changed: ${{ steps.detect.outputs.firefox_changed }}
      edge_changed: ${{ steps.detect.outputs.edge_changed }}
      new_version: ${{ steps.bump.outputs.new_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect which folders changed
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }})
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          fi
          echo "$CHANGED"
          echo "firefox_changed=$(echo "$CHANGED" | grep -q '^LekolarEnhancer/' && echo true || echo false)" >> $GITHUB_OUTPUT
          # Treat changes in either Firefox or Edge source as a signal to publish Edge
          echo "edge_changed=$(echo "$CHANGED" | grep -Eq '^(LekolarEnhancer/|LekolarEnhancer-Edge/)' && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Bump patch version in both manifests
        id: bump
        run: |
          # Read version from Firefox manifest (source of truth)
          CURRENT=$(python3 -c "import json; print(json.load(open('LekolarEnhancer/manifest.json'))['version'])")
          echo "Current version: $CURRENT"

          IFS='.' read -ra PARTS <<< "$CURRENT"
          PARTS[-1]=$((${PARTS[-1]} + 1))
          NEW=$(IFS='.'; echo "${PARTS[*]}")
          echo "New version: $NEW"
          echo "new_version=$NEW" >> $GITHUB_OUTPUT

          # Update Firefox manifest
          python3 - <<EOF
          import json
          for path in ['LekolarEnhancer/manifest.json', 'LekolarEnhancer-Edge/manifest.json']:
              with open(path, 'r') as f:
                  data = json.load(f)
              data['version'] = '$NEW'
              with open(path, 'w') as f:
                  json.dump(data, f, indent=2, ensure_ascii=False)
                  f.write('\n')
          EOF

      - name: Commit and push version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add LekolarEnhancer/manifest.json LekolarEnhancer-Edge/manifest.json
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: bump extension version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push

  # ── 2a. Publish to Firefox AMO ─────────────────────────────────────────────
  publish-firefox:
    name: Publish to Firefox AMO
    needs: bump-versions
    if: needs.bump-versions.outputs.firefox_changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (after version bump commit)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Sign & upload to AMO
        run: |
          web-ext sign \
            --source-dir ./LekolarEnhancer \
            --channel unlisted \
            --api-key    "${{ secrets.FIREFOX_API_ISSUER }}" \
            --api-secret "${{ secrets.FIREFOX_API_SECRET }}" \
            --timeout 300000
        # 'listed' = public AMO listing (use 'unlisted' for private/self-hosted)

  # ── 2b. Publish to Edge Add-ons ───────────────────────────────────────────
  publish-edge:
    name: Publish to Edge Add-ons
    needs: bump-versions
    if: needs.bump-versions.outputs.edge_changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (after version bump commit)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Create extension ZIP
        run: |
          cd LekolarEnhancer-Edge
          zip -r ../edge-extension.zip . --exclude "*.git*" --exclude "*.DS_Store"
          echo "ZIP created: $(du -sh ../edge-extension.zip | cut -f1)"

      - name: Upload package to Edge
        id: upload
        run: |
          RESPONSE=$(curl -s -i \
            -H "Authorization: ApiKey ${{ secrets.EDGE_API_KEY }}" \
            -H "X-ClientID: ${{ secrets.EDGE_CLIENT_ID }}" \
            -H "Content-Type: application/zip" \
            -X POST \
            -T edge-extension.zip \
            "https://api.addons.microsoftedge.microsoft.com/v1/products/${{ secrets.EDGE_PRODUCT_ID }}/submissions/draft/package")

          echo "$RESPONSE"
          STATUS=$(echo "$RESPONSE" | grep "^HTTP" | tail -1 | awk '{print $2}')
          OP_ID=$(echo "$RESPONSE"  | grep -i "^Location:" | awk '{print $2}' | tr -d '\r\n')
          echo "HTTP: $STATUS  |  OperationId: $OP_ID"
          echo "operation_id=$OP_ID" >> $GITHUB_OUTPUT
          [ "$STATUS" = "202" ] || (echo "Upload failed ($STATUS)" && exit 1)

      - name: Wait for upload
        run: |
          STATUS="InProgress"; N=0
          while [ "$STATUS" = "InProgress" ] && [ $N -lt 15 ]; do
            sleep 10
            R=$(curl -s \
              -H "Authorization: ApiKey ${{ secrets.EDGE_API_KEY }}" \
              -H "X-ClientID: ${{ secrets.EDGE_CLIENT_ID }}" \
              "https://api.addons.microsoftedge.microsoft.com${{ steps.upload.outputs.operation_id }}")
            STATUS=$(echo "$R" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','InProgress'))" 2>/dev/null || echo "InProgress")
            echo "Poll $((++N)): $STATUS"
          done
          [ "$STATUS" = "Succeeded" ] || (echo "Upload did not succeed: $STATUS" && exit 1)

      - name: Publish submission
        id: publish
        run: |
          RESPONSE=$(curl -s -i \
            -H "Authorization: ApiKey ${{ secrets.EDGE_API_KEY }}" \
            -H "X-ClientID: ${{ secrets.EDGE_CLIENT_ID }}" \
            -H "Content-Type: application/json" \
            -X POST \
            -d "{\"notes\": \"Auto-published v${{ needs.bump-versions.outputs.new_version }} via GitHub Actions\"}" \
            "https://api.addons.microsoftedge.microsoft.com/v1/products/${{ secrets.EDGE_PRODUCT_ID }}/submissions")

          echo "$RESPONSE"
          STATUS=$(echo "$RESPONSE" | grep "^HTTP" | tail -1 | awk '{print $2}')
          OP_ID=$(echo "$RESPONSE"  | grep -i "^Location:" | awk '{print $2}' | tr -d '\r\n')
          echo "operation_id=$OP_ID" >> $GITHUB_OUTPUT
          [ "$STATUS" = "202" ] || (echo "Publish failed ($STATUS)" && exit 1)

      - name: Wait for publish
        run: |
          STATUS="InProgress"; N=0
          while [ "$STATUS" = "InProgress" ] && [ $N -lt 20 ]; do
            sleep 15
            R=$(curl -s \
              -H "Authorization: ApiKey ${{ secrets.EDGE_API_KEY }}" \
              -H "X-ClientID: ${{ secrets.EDGE_CLIENT_ID }}" \
              "https://api.addons.microsoftedge.microsoft.com${{ steps.publish.outputs.operation_id }}")
            STATUS=$(echo "$R" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','InProgress'))" 2>/dev/null || echo "InProgress")
            echo "Poll $((++N)): $STATUS"
          done
          # InProgress after max polls = submitted for review, which is normal
          [ "$STATUS" = "Succeeded" ] || [ "$STATUS" = "InProgress" ] || \
            (echo "Publish failed: $STATUS" && exit 1)
          echo "✅ Edge extension v${{ needs.bump-versions.outputs.new_version }} submitted!"
