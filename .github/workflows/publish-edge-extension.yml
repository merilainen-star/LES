name: Publish Extensions (Edge + Firefox)

on:
  push:
    branches: [main]
    paths:
      - 'LekolarEnhancer/**'
      - 'LekolarEnhancer-Edge/**'
      - 'sync-edge-variant.ps1'
      - 'VERSIONING.md'

jobs:
  # ── 1. Bump versions and commit back ──────────────────────────────────────
  bump-versions:
    name: Bump manifest versions
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      firefox_changed: ${{ steps.detect.outputs.firefox_changed }}
      edge_changed: ${{ steps.detect.outputs.edge_changed }}
      new_version: ${{ steps.bump.outputs.new_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect which folders changed
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }})
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          fi
          echo "$CHANGED"
          echo "firefox_changed=$(echo "$CHANGED" | grep -q '^LekolarEnhancer/' && echo true || echo false)" >> $GITHUB_OUTPUT
          # Treat changes in either Firefox or Edge source as a signal to publish Edge
          echo "edge_changed=$(echo "$CHANGED" | grep -Eq '^(LekolarEnhancer/|LekolarEnhancer-Edge/)' && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Bump patch version in both manifests
        id: bump
        run: |
          # Read version from Firefox manifest (source of truth)
          CURRENT=$(python3 -c "import json; print(json.load(open('LekolarEnhancer/manifest.json'))['version'])")
          echo "Current version: $CURRENT"

          IFS='.' read -ra PARTS <<< "$CURRENT"
          PARTS[-1]=$((${PARTS[-1]} + 1))
          NEW=$(IFS='.'; echo "${PARTS[*]}")
          echo "New version: $NEW"
          echo "new_version=$NEW" >> $GITHUB_OUTPUT

          # Update Firefox manifest
          python3 - <<EOF
          import json
          for path in ['LekolarEnhancer/manifest.json', 'LekolarEnhancer-Edge/manifest.json']:
              with open(path, 'r') as f:
                  data = json.load(f)
              data['version'] = '$NEW'
              with open(path, 'w') as f:
                  json.dump(data, f, indent=2, ensure_ascii=False)
                  f.write('\n')
          EOF

      - name: Sync Edge variant from Firefox source
        shell: pwsh
        run: ./sync-edge-variant.ps1

      - name: Commit and push version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add LekolarEnhancer/manifest.json LekolarEnhancer-Edge/
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: bump extension version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push

  # ── 2a. Publish to Firefox AMO ─────────────────────────────────────────────
  publish-firefox:
    name: Publish to Firefox AMO
    needs: bump-versions
    if: needs.bump-versions.outputs.firefox_changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (after version bump commit)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Sign & upload to AMO
        run: |
          web-ext sign \
            --source-dir ./LekolarEnhancer \
            --channel unlisted \
            --api-key    "${{ secrets.FIREFOX_API_ISSUER }}" \
            --api-secret "${{ secrets.FIREFOX_API_SECRET }}" \
            --timeout 300000
        # 'listed' = public AMO listing (use 'unlisted' for private/self-hosted)

  # ── 2b. Publish to Edge Add-ons ───────────────────────────────────────────
  publish-edge:
    name: Publish to Edge Add-ons
    needs: bump-versions
    if: needs.bump-versions.outputs.edge_changed == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout (after version bump commit)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Create extension ZIP
        run: |
          set -euo pipefail
          cd LekolarEnhancer-Edge
          zip -r ../edge-extension.zip . --exclude "*.git*" --exclude "*.DS_Store"
          echo "ZIP created: $(du -sh ../edge-extension.zip | cut -f1)"

      - name: Upload package to Edge
        id: upload
        env:
          EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
        run: |
          set -euo pipefail

          upload_headers="$(mktemp)"
          upload_body="$(mktemp)"

          cleanup() {
            rm -f "$upload_headers" "$upload_body"
          }
          trap cleanup EXIT

          upload_status="$(
            curl -sS \
              -D "$upload_headers" \
              -o "$upload_body" \
              -w "%{http_code}" \
              -H "Authorization: ApiKey $EDGE_API_KEY" \
              -H "X-ClientID: $EDGE_CLIENT_ID" \
              -H "Content-Type: application/zip" \
              -X POST \
              --upload-file edge-extension.zip \
              "https://api.addons.microsoftedge.microsoft.com/v1/products/$EDGE_PRODUCT_ID/submissions/draft/package"
          )"

          upload_location="$(awk 'BEGIN{IGNORECASE=1} /^Location:/ {print $2}' "$upload_headers" | tail -n1 | tr -d '\r\n')"
          upload_op_id="${upload_location##*/}"

          echo "Upload HTTP status: $upload_status"
          echo "Upload Location: ${upload_location:-<empty>}"
          echo "Upload operation ID: ${upload_op_id:-<empty>}"

          if [[ "$upload_status" != "202" ]]; then
            echo "Upload request failed before polling."
            echo "Upload response body:"
            cat "$upload_body"
            exit 1
          fi

          if [[ -z "$upload_location" || -z "$upload_op_id" ]]; then
            echo "Upload response did not include a valid Location header."
            echo "Upload response headers:"
            cat "$upload_headers"
            exit 1
          fi

          echo "operation_id=$upload_op_id" >> "$GITHUB_OUTPUT"

      - name: Wait for upload
        env:
          EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
        run: |
          set -euo pipefail

          upload_op_id="${{ steps.upload.outputs.operation_id }}"
          if [[ -z "$upload_op_id" ]]; then
            echo "Upload operation ID is empty."
            exit 1
          fi

          upload_url="https://api.addons.microsoftedge.microsoft.com/v1/products/$EDGE_PRODUCT_ID/submissions/draft/package/operations/$upload_op_id"
          echo "Polling upload operation: $upload_op_id"

          status="InProgress"
          for attempt in $(seq 1 15); do
            sleep 10

            upload_poll_body="$(mktemp)"
            if ! curl -fsS \
              -o "$upload_poll_body" \
              -H "Authorization: ApiKey $EDGE_API_KEY" \
              -H "X-ClientID: $EDGE_CLIENT_ID" \
              "$upload_url"; then
              echo "Upload status poll failed on attempt $attempt."
              [[ -f "$upload_poll_body" ]] && cat "$upload_poll_body"
              rm -f "$upload_poll_body"
              exit 1
            fi

            status="$(python3 -c "import json,sys; print(json.load(sys.stdin).get('status',''))" < "$upload_poll_body")"
            echo "Upload poll $attempt status: ${status:-<empty>}"

            if [[ "$status" == "Succeeded" ]]; then
              rm -f "$upload_poll_body"
              exit 0
            fi

            if [[ "$status" == "Failed" ]]; then
              echo "Upload operation failed."
              echo "Upload status response body:"
              cat "$upload_poll_body"
              rm -f "$upload_poll_body"
              exit 1
            fi

            rm -f "$upload_poll_body"
          done

          echo "Upload did not reach Succeeded within the polling window. Last status: ${status:-<empty>}"
          exit 1

      - name: Publish submission
        id: publish
        env:
          EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
        run: |
          set -euo pipefail

          publish_headers="$(mktemp)"
          publish_body="$(mktemp)"

          cleanup() {
            rm -f "$publish_headers" "$publish_body"
          }
          trap cleanup EXIT

          publish_content_type="application/json"
          publish_request_body='{"notes":"Automated publish from GitHub Actions"}'

          publish_status="$(
            curl -sS \
              -D "$publish_headers" \
              -o "$publish_body" \
              -w "%{http_code}" \
              -H "Authorization: ApiKey $EDGE_API_KEY" \
              -H "X-ClientID: $EDGE_CLIENT_ID" \
              -H "Content-Type: $publish_content_type" \
              -X POST \
              -d "$publish_request_body" \
              "https://api.addons.microsoftedge.microsoft.com/v1/products/$EDGE_PRODUCT_ID/submissions"
          )"

          publish_location="$(awk 'BEGIN{IGNORECASE=1} /^Location:/ {print $2}' "$publish_headers" | tail -n1 | tr -d '\r\n')"
          publish_op_id="${publish_location##*/}"

          echo "Publish HTTP status: $publish_status"
          echo "Publish Location: ${publish_location:-<empty>}"
          echo "Publish operation ID: ${publish_op_id:-<empty>}"

          if [[ "$publish_status" != "202" ]]; then
            echo "Publish request failed before polling."
            echo "Publish response body:"
            cat "$publish_body"
            exit 1
          fi

          if [[ -z "$publish_location" || -z "$publish_op_id" ]]; then
            echo "Publish response did not include a valid Location header."
            echo "Publish response headers:"
            cat "$publish_headers"
            exit 1
          fi

          echo "operation_id=$publish_op_id" >> "$GITHUB_OUTPUT"

      - name: Wait for publish
        env:
          EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
        run: |
          set -euo pipefail

          publish_op_id="${{ steps.publish.outputs.operation_id }}"
          if [[ -z "$publish_op_id" ]]; then
            echo "Publish operation ID is empty."
            exit 1
          fi

          publish_url="https://api.addons.microsoftedge.microsoft.com/v1/products/$EDGE_PRODUCT_ID/submissions/operations/$publish_op_id"
          echo "Polling publish operation: $publish_op_id"

          status="InProgress"
          for attempt in $(seq 1 20); do
            sleep 15

            publish_poll_body="$(mktemp)"
            if ! curl -fsS \
              -o "$publish_poll_body" \
              -H "Authorization: ApiKey $EDGE_API_KEY" \
              -H "X-ClientID: $EDGE_CLIENT_ID" \
              "$publish_url"; then
              echo "Publish status poll failed on attempt $attempt."
              [[ -f "$publish_poll_body" ]] && cat "$publish_poll_body"
              rm -f "$publish_poll_body"
              exit 1
            fi

            status="$(python3 -c "import json,sys; print(json.load(sys.stdin).get('status',''))" < "$publish_poll_body")"
            echo "Publish poll $attempt status: ${status:-<empty>}"

            if [[ "$status" == "Succeeded" ]]; then
              rm -f "$publish_poll_body"
              echo "Edge extension v${{ needs.bump-versions.outputs.new_version }} published successfully."
              exit 0
            fi

            if [[ "$status" == "Failed" ]]; then
              echo "Publish operation failed."
              echo "Publish status response body:"
              cat "$publish_poll_body"
              rm -f "$publish_poll_body"
              exit 1
            fi

            rm -f "$publish_poll_body"
          done

          echo "Publish did not reach Succeeded within the polling window. Last status: ${status:-<empty>}"
          exit 1
