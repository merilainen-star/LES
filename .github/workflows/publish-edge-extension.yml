name: Publish Edge Extension

on:
  push:
    branches: [main]
    paths:
      - 'LekolarEnhancer-Edge/**'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Need full history + write access to commit the version bump
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Auto-bump the patch version in manifest.json ──────────────────────
      - name: Bump version in manifest.json
        id: bump
        run: |
          MANIFEST="LekolarEnhancer-Edge/manifest.json"
          CURRENT=$(python3 -c "import json,sys; d=json.load(open('$MANIFEST')); print(d['version'])")
          echo "Current version: $CURRENT"

          # Split into parts and bump the last number
          IFS='.' read -ra PARTS <<< "$CURRENT"
          LAST=${PARTS[-1]}
          PARTS[-1]=$((LAST + 1))
          NEW_VERSION=$(IFS='.'; echo "${PARTS[*]}")
          echo "New version: $NEW_VERSION"

          python3 - <<EOF
          import json
          with open('$MANIFEST', 'r') as f:
              data = json.load(f)
          data['version'] = '$NEW_VERSION'
          with open('$MANIFEST', 'w') as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
              f.write('\n')
          EOF

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and push version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add LekolarEnhancer-Edge/manifest.json
          git commit -m "chore: bump Edge extension version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push

      # ── Package ───────────────────────────────────────────────────────────
      - name: Create extension ZIP
        run: |
          cd LekolarEnhancer-Edge
          zip -r ../extension.zip . --exclude "*.git*" --exclude "*.DS_Store"
          echo "ZIP created. Size: $(du -sh ../extension.zip | cut -f1)"

      # ── Upload to Edge Add-ons ─────────────────────────────────────────────
      - name: Upload package
        id: upload
        run: |
          echo "Uploading extension..."
          RESPONSE=$(curl -s -i \
            -H "Authorization: ApiKey ${{ secrets.EDGE_API_KEY }}" \
            -H "X-ClientID: ${{ secrets.EDGE_CLIENT_ID }}" \
            -H "Content-Type: application/zip" \
            -X POST \
            -T extension.zip \
            "https://api.addons.microsoftedge.microsoft.com/v1/products/${{ secrets.EDGE_PRODUCT_ID }}/submissions/draft/package")

          echo "$RESPONSE"

          STATUS_CODE=$(echo "$RESPONSE" | grep "^HTTP" | tail -1 | awk '{print $2}')
          echo "HTTP status: $STATUS_CODE"

          OPERATION_ID=$(echo "$RESPONSE" | grep -i "^Location:" | awk '{print $2}' | tr -d '\r\n')
          echo "Operation ID: $OPERATION_ID"
          echo "operation_id=$OPERATION_ID" >> $GITHUB_OUTPUT

          [ "$STATUS_CODE" = "202" ] || (echo "Upload failed with status $STATUS_CODE" && exit 1)

      # ── Wait for upload to process ─────────────────────────────────────────
      - name: Wait for upload to complete
        run: |
          STATUS="InProgress"
          RETRIES=0
          MAX=15
          while [ "$STATUS" = "InProgress" ] && [ $RETRIES -lt $MAX ]; do
            sleep 10
            RESP=$(curl -s \
              -H "Authorization: ApiKey ${{ secrets.EDGE_API_KEY }}" \
              -H "X-ClientID: ${{ secrets.EDGE_CLIENT_ID }}" \
              "https://api.addons.microsoftedge.microsoft.com${{ steps.upload.outputs.operation_id }}")
            echo "Poll $((RETRIES+1)): $RESP"
            STATUS=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','InProgress'))" 2>/dev/null || echo "InProgress")
            RETRIES=$((RETRIES + 1))
          done
          echo "Upload final status: $STATUS"
          [ "$STATUS" = "Succeeded" ] || (echo "Upload did not succeed. Status: $STATUS" && exit 1)

      # ── Publish ────────────────────────────────────────────────────────────
      - name: Publish submission
        id: publish
        run: |
          echo "Publishing..."
          RESPONSE=$(curl -s -i \
            -H "Authorization: ApiKey ${{ secrets.EDGE_API_KEY }}" \
            -H "X-ClientID: ${{ secrets.EDGE_CLIENT_ID }}" \
            -H "Content-Type: application/json" \
            -X POST \
            -d "{\"notes\": \"Auto-published from GitHub Actions — v${{ steps.bump.outputs.new_version }}\"}" \
            "https://api.addons.microsoftedge.microsoft.com/v1/products/${{ secrets.EDGE_PRODUCT_ID }}/submissions")

          echo "$RESPONSE"

          STATUS_CODE=$(echo "$RESPONSE" | grep "^HTTP" | tail -1 | awk '{print $2}')
          echo "HTTP status: $STATUS_CODE"

          OPERATION_ID=$(echo "$RESPONSE" | grep -i "^Location:" | awk '{print $2}' | tr -d '\r\n')
          echo "Operation ID: $OPERATION_ID"
          echo "operation_id=$OPERATION_ID" >> $GITHUB_OUTPUT

          [ "$STATUS_CODE" = "202" ] || (echo "Publish failed with status $STATUS_CODE" && exit 1)

      # ── Wait for publish to complete ───────────────────────────────────────
      - name: Check publish status
        run: |
          STATUS="InProgress"
          RETRIES=0
          MAX=20
          while [ "$STATUS" = "InProgress" ] && [ $RETRIES -lt $MAX ]; do
            sleep 15
            RESP=$(curl -s \
              -H "Authorization: ApiKey ${{ secrets.EDGE_API_KEY }}" \
              -H "X-ClientID: ${{ secrets.EDGE_CLIENT_ID }}" \
              "https://api.addons.microsoftedge.microsoft.com${{ steps.publish.outputs.operation_id }}")
            echo "Poll $((RETRIES+1)): $RESP"
            STATUS=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','InProgress'))" 2>/dev/null || echo "InProgress")
            RETRIES=$((RETRIES + 1))
          done
          echo "Publish final status: $STATUS"
          # InProgress after max retries = submitted for review, which is fine
          [ "$STATUS" = "Succeeded" ] || [ "$STATUS" = "InProgress" ] || (echo "Publish failed. Status: $STATUS" && exit 1)
          echo "✅ Extension v${{ steps.bump.outputs.new_version }} submitted successfully!"
