<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lekolar Enhancer</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="popup-container">
    <div class="popup-header">
      <img src="logo.png" alt="Logo" class="header-logo">
      <div class="header-text">
        <h1>Lekolar Enhancer</h1>
        <span class="version" id="versionLabel"></span>
      </div>
    </div>

    <!-- Master power button -->
    <div class="power-zone">
      <button id="powerBtn" class="power-btn" type="button" aria-label="Toggle Lekolar Enhancer">
        <svg viewBox="0 0 64 64" class="power-icon" aria-hidden="true">
          <path d="M32 8 L32 32" stroke="currentColor" stroke-width="6" stroke-linecap="round" fill="none"/>
          <path d="M18 18 A 20 20 0 1 0 46 18" stroke="currentColor" stroke-width="6" stroke-linecap="round" fill="none"/>
        </svg>
      </button>
      <div class="power-label" id="powerLabel">Enabled</div>
      <div class="power-hint" id="powerHint">Click to disable on all Lekolar sites</div>
    </div>

    <div id="permissionWarning" class="permission-warning hidden">
      Lekolar site permission is not granted. Click the extension icon on a Lekolar page and allow site access.
    </div>

    <!-- SharePoint entitlement (kept on popup — quick at-a-glance check) -->
    <div class="section compact-section">
      <div class="section-row">
        <span class="section-row-label">Extended features</span>
        <button id="recheckEntitlementBtn" class="primary-btn secondary-btn compact-btn" type="button">Re-check</button>
      </div>
      <p id="entitlementStatus" class="hint status-line">Status: Unknown</p>
    </div>

    <!-- Open full settings -->
    <div class="section compact-section">
      <button id="openSettingsBtn" class="primary-btn full-btn" type="button">⚙ Open settings</button>
      <button id="openWhatsNewBtn" class="link-btn whats-new-btn" type="button">
        What's new <span class="whats-new-dot hidden" id="whatsNewDot"></span>
      </button>
    </div>
  </div>

  <script src="defaults.js"></script>
  <script src="popup.js"></script>
</body>

</html>
