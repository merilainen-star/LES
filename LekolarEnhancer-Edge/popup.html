<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lekolar Enhancer</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="popup-container">
    <div class="popup-header">
      <img src="logo.png" alt="Logo" class="header-logo">
      <div class="header-text">
        <div class="header-title-row">
          <h1>Lekolar Enhancer</h1>
          <button id="shareAddonBtn" class="share-addon-btn" type="button" aria-label="Copy Edge Add-ons link" title="Copy Edge Add-ons link">
            <svg viewBox="0 0 24 24" class="share-icon" aria-hidden="true">
              <path d="M8.2 12.4 15.8 7.7M8.2 11.6l7.6 4.7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
              <circle cx="6" cy="12" r="2.4" fill="none" stroke="currentColor" stroke-width="1.8"/>
              <circle cx="18" cy="6.5" r="2.4" fill="none" stroke="currentColor" stroke-width="1.8"/>
              <circle cx="18" cy="17.5" r="2.4" fill="none" stroke="currentColor" stroke-width="1.8"/>
            </svg>
          </button>
        </div>
        <span class="version" id="versionLabel"></span>
      </div>
    </div>
    <div id="shareToast" class="share-toast hidden" role="status" aria-live="polite"></div>

    <!-- Master power button -->
    <div class="power-zone">
      <button id="powerBtn" class="power-btn" type="button" aria-label="Toggle Lekolar Enhancer">
        <svg viewBox="0 0 64 64" class="power-icon" aria-hidden="true">
          <path d="M32 8 L32 32" stroke="currentColor" stroke-width="6" stroke-linecap="round" fill="none"/>
          <path d="M18 18 A 20 20 0 1 0 46 18" stroke="currentColor" stroke-width="6" stroke-linecap="round" fill="none"/>
        </svg>
      </button>
      <div class="power-label" id="powerLabel">Enabled</div>
      <div class="power-hint" id="powerHint">Click to disable on all Lekolar sites</div>
      <button id="refreshPageBtn" class="refresh-page-btn hidden" type="button" aria-label="Refresh current page to apply addon state" title="Refresh page to show the new addon state">
        <svg viewBox="0 0 24 24" class="refresh-icon" aria-hidden="true">
          <path d="M20 11a8 8 0 0 0-14.4-4.8L4 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M4 4v4h4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M4 13a8 8 0 0 0 14.4 4.8L20 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M20 20v-4h-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <div id="permissionWarning" class="permission-warning hidden">
      Lekolar site permission is not granted. Click the extension icon on a Lekolar page and allow site access.
    </div>

    <div id="priceSimulationStatus" class="price-simulation-status hidden" role="status" aria-live="polite"></div>

    <!-- SharePoint entitlement (kept on popup: quick at-a-glance check) -->
    <div class="section compact-section sharepoint-section">
      <div class="section-row sharepoint-row">
        <span class="section-row-label">SharePoint</span>
        <button id="recheckEntitlementBtn" class="icon-btn sharepoint-check-btn" type="button" aria-label="Check SharePoint connection" title="Check SharePoint connection">
          <svg viewBox="0 0 24 24" class="action-icon" aria-hidden="true">
            <path d="M20 11a8 8 0 0 0-13.6-5.7L5 6.7" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M5 3v3.7h3.7" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M4 13a8 8 0 0 0 13.6 5.7L19 17.3" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M19 21v-3.7h-3.7" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <p id="entitlementStatus" class="hint status-line">Status: Unknown</p>
    </div>

    <div class="section nerd-section">
      <div class="section-row">
        <span class="section-row-label">Stats for nerds</span>
      </div>
      <div class="nerd-grid" id="nerdStats">
        <div><span id="statHost">-</span><small>host</small></div>
        <div><span id="statEnabledFeatures">-</span><small>features on</small></div>
        <div><span id="statSharePointAge">-</span><small>SP check</small></div>
      </div>
    </div>

    <!-- Open full settings -->
    <div class="footer-actions">
      <button id="openSettingsBtn" class="icon-btn settings-btn" type="button" aria-label="Open settings" title="Open settings">
        <svg viewBox="0 0 24 24" class="action-icon" aria-hidden="true">
          <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z" fill="none" stroke="currentColor" stroke-width="1.8"/>
          <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 0 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6V21a2 2 0 0 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1A2 2 0 0 1 4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.6-1H3a2 2 0 0 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9L4.3 7A2 2 0 0 1 7 4.2l.1.1a1.7 1.7 0 0 0 1.9.3 1.7 1.7 0 0 0 1-1.6V3a2 2 0 0 1 4 0v.1a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1A2 2 0 0 1 19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.6 1h.1a2 2 0 0 1 0 4H21a1.7 1.7 0 0 0-1.6 1Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <script src="defaults.js"></script>
  <script src="popup.js"></script>
</body>

</html>
